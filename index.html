<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Calendar Pro | PRACHATIPAT</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #38bdf8; --text: #e6edf3; 
            --pink: #f472b6; --blue: #38bdf8; --purple: #a78bfa; --orange: #fb923c; --green: #4ad399;
        }
        * { box-sizing: border-box; font-family: 'Chakra Petch', sans-serif; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #30363d; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--accent); font-size: 1.2rem; margin: 5px 0; letter-spacing: 1px; }
        
        label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #8b949e; font-weight: bold; text-transform: uppercase; }
        select, input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; color: white; padding: 15px; margin-bottom: 15px; outline: none; font-size: 1rem; }

        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .q-btn { padding: 15px 5px; background: #21262d; border: 1px solid #30363d; border-radius: 14px; color: #8b949e; cursor: pointer; font-size: 0.9rem; text-align: center; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .q-btn span { font-size: 1.3rem; }
        
        .q-btn.active-นุ่น { background: var(--pink); color: #000; border-color: var(--pink); box-shadow: 0 0 20px rgba(244, 114, 182, 0.4); }
        .q-btn.active-พี่หมิว { background: var(--blue); color: #000; border-color: var(--blue); }
        .q-btn.active-พี่ซานิ { background: var(--purple); color: #000; border-color: var(--purple); }
        .q-btn.active-น้องฮาย { background: var(--orange); color: #000; border-color: var(--orange); }
        .q-btn.active-พี่ออย { background: var(--green); color: #000; border-color: var(--green); }
        .q-btn.active-time { background: #f8fafc; color: #000; border-color: #fff; transform: scale(1.05); }

        .summary-box { background: rgba(255,255,255,0.02); padding: 18px; border-radius: 15px; border-left: 5px solid var(--accent); font-size: 1rem; margin-bottom: 25px; }
        .main-btn { background: var(--accent); color: #0d1117; border: none; width: 100%; padding: 22px; border-radius: 18px; font-weight: 800; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 20px rgba(56, 189, 248, 0.3); }
        .main-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span id="ai-status" style="font-size: 0.65rem; border: 1px solid var(--accent); padding: 3px 12px; border-radius: 20px; color: var(--accent); font-weight: bold;">SMART SYSTEM ACTIVE</span>
        <h1 id="main-title">PRACHATIPAT HOSPITAL</h1>
    </div>

    <label>👩‍⚕️ STAFF (🐱 นุ่นสีชมพู)</label>
    <div class="btn-grid" id="staffSelector">
        <div class="q-btn active-นุ่น" onclick="setStaff('นุ่น (ไอตัวเล็ก)', this, '🐱')"><span>🐱</span>นุ่น</div>
        <div class="q-btn" onclick="setStaff('พี่หมิว', this, '🐰')"><span>🐰</span>พี่หมิว</div>
        <div class="q-btn" onclick="setStaff('พี่ซานิ', this, '🦊')"><span>🦊</span>พี่ซานิ</div>
        <div class="q-btn" onclick="setStaff('น้องฮาย', this, '🐼')"><span>🐼</span>น้องฮาย</div>
        <div class="q-btn" onclick="setStaff('พี่ออย', this, '🦁')"><span>🦁</span>พี่ออย</div>
    </div>

    <label>📝 ACTIVITY</label>
    <select id="workType" onchange="hapticFeedback(20); updateSummary();">
        <option value="อยู่เวร 🏥">อยู่เวรปกติ</option>
        <option value="เวร 24 ชม. 🏥">เวร 24 ชั่วโมง</option>
        <option value="ลาครึ่งวัน 🌓">ลาครึ่งวัน</option>
        <option value="เข้าครึ่งวัน 🌗">เข้าครึ่งวัน</option>
        <option value="OT ⚡">OT (ล่วงเวลา)</option>
        <option value="ลาป่วย 🤒">ลาป่วย</option>
        <option value="ลากิจ 📁">ลากิจ</option>
    </select>

    <label>📅 SELECT DATE (วัน)</label>
    <div class="btn-grid" id="dateSelector">
        <div class="q-btn active-time" onclick="quickDate(0, this)">วันนี้</div>
        <div class="q-btn" onclick="quickDate(1, this)">พรุ่งนี้</div>
        <div class="q-btn" onclick="quickDate(2, this)">มะรืนนี้</div>
    </div>

    <label>⏰ SELECT SHIFT (กะทำงาน)</label>
    <div class="btn-grid" id="timeSelector">
        <div class="q-btn" onclick="quickTime(8, this)">เช้า (08:00)</div>
        <div class="q-btn" onclick="quickTime(16, this)">บ่าย (16:00)</div>
        <div class="q-btn" onclick="quickTime(0, this)">ดึก (00:00)</div>
    </div>

    <input type="datetime-local" id="startTime" onchange="updateSummary()">

    <div class="summary-box" id="summary">✨ เลือกข้อมูลสรุป...</div>

    <button class="main-btn" id="submitBtn" onclick="exportToIOS()">📅 SEND TO IPHONE</button>
</div>

<script>
    let selectedStaff = "นุ่น (ไอตัวเล็ก)";
    let selectedIcon = "🐱";
    let currentDate = new Date();
    const colors = { 'นุ่น (ไอตัวเล็ก)': '#f472b6', 'พี่หมิว': '#38bdf8', 'พี่ซานิ': '#a78bfa', 'น้องฮาย': '#fb923c', 'พี่ออย': '#4ad399' };

    function hapticFeedback(ms = 15) {
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(ms);
        }
    }

    function setStaff(name, el, icon) {
        hapticFeedback(20);
        selectedStaff = name;
        selectedIcon = icon;
        resetBtns('staffSelector');
        const shortName = name.includes("นุ่น") ? "นุ่น" : name;
        el.classList.add('active-' + shortName);
        const color = colors[name];
        document.getElementById('ai-status').style.color = color;
        document.getElementById('ai-status').style.borderColor = color;
        document.getElementById('main-title').style.color = color;
        document.getElementById('submitBtn').style.background = color;
        document.getElementById('summary').style.borderColor = color;
        updateSummary();
    }

    function quickDate(days, el) {
        hapticFeedback(15);
        let d = new Date();
        d.setDate(d.getDate() + days);
        currentDate.setFullYear(d.getFullYear(), d.getMonth(), d.getDate());
        resetBtns('dateSelector');
        el.classList.add('active-time');
        updateInput();
    }

    function quickTime(hour, el) {
        hapticFeedback(30);
        currentDate.setHours(hour, 0, 0, 0);
        resetBtns('timeSelector');
        el.classList.add('active-time');
        updateInput();
    }

    function updateInput() {
        const offset = currentDate.getTimezoneOffset() * 60000;
        const localISOTime = new Date(currentDate - offset).toISOString().slice(0, 16);
        document.getElementById('startTime').value = localISOTime;
        updateSummary();
    }

    function resetBtns(parentId) {
        document.getElementById(parentId).querySelectorAll('.q-btn').forEach(btn => { btn.className = 'q-btn'; });
    }

    function updateSummary() {
        const type = document.getElementById('workType').value;
        const time = document.getElementById('startTime').value;
        if(!time) return;
        const dateStr = new Date(time).toLocaleDateString('th-TH', { day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' });
        document.getElementById('summary').innerHTML = `<span style="color:${colors[selectedStaff]}">${selectedIcon} <b>${selectedStaff}</b></span><br>📌 ${type}<br>🗓️ ${dateStr}`;
    }

    function exportToIOS() {
        hapticFeedback(50);
        const time = document.getElementById('startTime').value;
        const type = document.getElementById('workType').value;
        if(!time) return alert("กรุณาเลือกวันที่");

        const start = new Date(time);
        
        // --- ระบบคำนวณระยะเวลาแบบไดนามิก ---
        let duration = 8; // ปกติ 8 ชม.
        if (type.includes("24 ชม.")) duration = 24;
        else if (type.includes("ครึ่งวัน")) duration = 4; // ลา/เข้า ครึ่งวัน = 4 ชม.

        const end = new Date(start.getTime() + duration * 60 * 60 * 1000); 
        
        const formatLocal = (d) => {
            const pad = (n) => n < 10 ? '0' + n : n;
            return d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + 'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
        };

        const ics = [
            "BEGIN:VCALENDAR", "VERSION:2.0", "BEGIN:VEVENT",
            `SUMMARY:${selectedIcon} ${selectedStaff}: ${type}`,
            `DTSTART:${formatLocal(start)}`, `DTEND:${formatLocal(end)}`,
            `LOCATION:โรงพยาบาลประชาธิปัตย์`, `DESCRIPTION:บันทึกโดยระบบ AI Smart Calendar`,
            "BEGIN:VALARM", "TRIGGER:-PT30M", "ACTION:DISPLAY", "END:VALARM",
            "END:VEVENT", "END:VCALENDAR"
        ].join("\n");

        const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `${selectedStaff}-work.ics`; a.click();
    }
    updateInput();
</script>
</body>
</html>
