<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prachatipat Hospital | Smart Calendar</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #38bdf8; --text: #e6edf3; --pink: #f472b6; --holiday: #ff4757; }
        * { box-sizing: border-box; font-family: 'Chakra Petch', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; }
        
        .header { text-align: center; margin: 15px 0; }
        .header h2 { color: var(--accent); margin: 0; font-size: 1.5rem; text-transform: capitalize; }
        #sync-status { font-size: 0.75rem; color: #fbbf24; margin-top: 5px; }

        /* Calendar Style */
        .calendar-card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #30363d; margin-bottom: 20px; width: 100%; }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; color: var(--accent); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-day-head { font-size: 0.75rem; color: #8b949e; font-weight: bold; padding-bottom: 8px; }
        
        .cal-cell { 
            background: #0d1117; min-height: 100px; border-radius: 10px; border: 1px solid #30363d; 
            display: flex; flex-direction: column; align-items: center; padding: 4px; position: relative; cursor: pointer;
        }
        .cal-cell.today { border: 2px solid var(--accent); }
        .cal-cell.selected { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); transform: scale(1.02); z-index: 5; }
        
        .date-num { font-size: 0.95rem; font-weight: bold; margin-bottom: 2px; }
        .holiday-label { font-size: 0.55rem; color: var(--holiday); font-weight: bold; margin-bottom: 4px; line-height: 1.1; }
        .event-tag { 
            font-size: 0.55rem; width: 100%; text-align: left; border-radius: 4px; margin-bottom: 2px;
            padding: 2px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
        }

        /* Input Form */
        .input-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #30363d; width: 100%; margin-bottom: 20px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .q-btn { padding: 10px; background: #21262d; border: 1px solid #30363d; border-radius: 10px; color: #8b949e; cursor: pointer; text-align: center; font-size: 0.75rem; }
        .q-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        .q-btn.active-นุ่น { background: var(--pink); color: #000; font-weight: bold; }
        
        select, input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .main-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        .hist-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin: 10px 0; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .del-btn { color:#ff4757; cursor:pointer; font-weight:bold; font-size:0.8rem; background:rgba(255,71,87,0.1); padding:6px 12px; border-radius:8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Prachatipat Hospital</h2>
        <div id="sync-status">🔄 กำลังโหลดข้อมูล...</div>
    </div>

    <div class="calendar-card">
        <div class="cal-header">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">◀</button>
            <strong id="monthLabel" style="font-size: 1.1rem;">เดือน</strong>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">▶</button>
        </div>
        <div class="cal-grid" id="calendarGrid"></div>
    </div>

    <div class="input-card">
        <div id="selected-info" style="font-size:0.9rem; color:var(--accent); margin-bottom:12px; text-align:center; font-weight:bold; background:rgba(56,189,248,0.1); padding:8px; border-radius:10px;">📍 เลือกวันที่ในปฏิทิน</div>
        
        <div class="btn-grid" id="staffSelector">
            <div class="q-btn active-นุ่น" onclick="setStaff('นุ่น', this)">นุ่น 🐱</div>
            <div class="q-btn" onclick="setStaff('พี่หมิว', this)">พี่หมิว 🐰</div>
            <div class="q-btn" onclick="setStaff('พี่ซานิ', this)">พี่ซานิ 🦊</div>
            <div class="q-btn" onclick="setStaff('น้องฮาย', this)">น้องฮาย 🐼</div>
            <div class="q-btn" onclick="setStaff('พี่ออย', this)">พี่ออย 🦁</div>
        </div>

        <select id="workType">
            <option value="อยู่เวร (เช้า)">อยู่เวร (เช้า)</option>
            <option value="อยู่เวร (บ่าย)">อยู่เวร (บ่าย)</option>
            <option value="อยู่เวร (ดึก)">อยู่เวร (ดึก)</option>
            <option value="เวร 24 ชม.">เวร 24 ชม.</option>
            <option value="ลาป่วย">ลาป่วย</option>
            <option value="ลากิจ">ลากิจ</option>
        </select>
        
        <input type="hidden" id="workDate">
        <button class="main-btn" id="saveBtn" onclick="saveData()">เพิ่มลงตารางเวร</button>
    </div>

    <div id="scheduleList"></div>
</div>

<script>
    // --- สำคัญมาก: ใส่ URL ของ Google Apps Script ของคุณที่นี่ ---
    const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbyQd9BaVroCfx3wy8WhVofjecI1DOuRLouUm4nis0p-dLEa_dTfbtTVdzs4MThf1WLZJA/exec';
    
    let db = [];
    let currentStaff = "นุ่น";
    let selectedDate = new Date().toISOString().split('T')[0];
    let viewDate = new Date();

    const staffInfo = {
        'นุ่น': { icon: '🐱', color: '#f472b6' },
        'พี่หมิว': { icon: '🐰', color: '#38bdf8' },
        'พี่ซานิ': { icon: '🦊', color: '#a78bfa' },
        'น้องฮาย': { icon: '🐼', color: '#fb923c' },
        'พี่ออย': { icon: '🦁', color: '#34d399' }
    };

    function getHoliday(dateStr) {
        const d = new Date(dateStr);
        const mmdd = (d.getMonth() + 1).toString().padStart(2, '0') + '-' + d.getDate().toString().padStart(2, '0');
        const dayOfWeek = d.getDay(); 

        const fixedHolidays = {
            "01-01": "วันขึ้นปีใหม่", "04-06": "วันจักรี", "04-13": "วันสงกรานต์", "04-14": "วันสงกรานต์",
            "04-15": "วันสงกรานต์", "05-01": "วันแรงงาน", "05-04": "วันฉัตรมงคล", "06-03": "วันราชินี",
            "07-28": "วัน ร.10", "08-12": "วันแม่", "10-13": "วัน ร.9", "10-23": "วันปิยมหาราช",
            "12-05": "วันพ่อ", "12-10": "วันรัฐธรรมนูญ", "12-31": "วันสิ้นปี"
        };

        if (fixedHolidays[mmdd]) return fixedHolidays[mmdd];

        if (dayOfWeek === 1) { 
            const sun = new Date(d); sun.setDate(d.getDate() - 1);
            const sat = new Date(d); sat.setDate(d.getDate() - 2);
            const sunKey = (sun.getMonth() + 1).toString().padStart(2, '0') + '-' + sun.getDate().toString().padStart(2, '0');
            const satKey = (sat.getMonth() + 1).toString().padStart(2, '0') + '-' + sat.getDate().toString().padStart(2, '0');
            if (fixedHolidays[sunKey] || fixedHolidays[satKey]) return "ชดเชยวันหยุด";
        }
        return null;
    }

    function setStaff(name, el) {
        currentStaff = name;
        document.querySelectorAll('#staffSelector .q-btn').forEach(b => b.classList.remove('active', 'active-นุ่น'));
        el.classList.add(name === 'นุ่น' ? 'active-นุ่น' : 'active');
        document.getElementById('saveBtn').style.background = staffInfo[name].color;
    }

    async function pullData() {
        if (!GOOGLE_URL) return;
        try {
            const res = await fetch(GOOGLE_URL);
            db = await res.json();
            document.getElementById('sync-status').innerHTML = '✅ ข้อมูลอัปเดตล่าสุด';
            render();
        } catch (e) { document.getElementById('sync-status').innerHTML = '❌ เชื่อมต่อไม่ได้'; }
    }

    function selectDate(date) {
        selectedDate = date;
        document.getElementById('workDate').value = date;
        const d = new Date(date).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
        document.getElementById('selected-info').innerText = `📍 วันที่เลือก: ${d}`;
        render();
    }

    async function saveData() {
        const type = document.getElementById('workType').value;
        const date = selectedDate;
        if(!date) return alert("เลือกวันที่ก่อนครับ");
        const entry = { id: Date.now().toString(), owner: currentStaff, type: type, date: date };
        db.push(entry); render();
        await fetch(GOOGLE_URL, { method: 'POST', body: JSON.stringify(entry), mode: 'no-cors' });
        pullData();
    }

    async function del(id) {
        if(!confirm('ลบรายการนี้?')) return;
        db = db.filter(i => i.id != id); render();
        await fetch(`${GOOGLE_URL}?action=delete&id=${id}`, { mode: 'no-cors' });
        pullData();
    }

    function changeMonth(val) { viewDate.setMonth(viewDate.getMonth() + val); render(); }

    function render() {
        const grid = document.getElementById('calendarGrid');
        const monthLabel = document.getElementById('monthLabel');
        grid.innerHTML = '';
        const days = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
        days.forEach(d => grid.innerHTML += `<div class="cal-day-head">${d}</div>`);
        monthLabel.innerText = viewDate.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
        const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const lastDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
        for(let d=1; d<=lastDate; d++) {
            const dateStr = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isToday = new Date().toISOString().split('T')[0] === dateStr;
            const isSelected = selectedDate === dateStr;
            const holidayName = getHoliday(dateStr);
            const dayEvents = db.filter(i => i.date && i.date.startsWith(dateStr));
            let eventHtml = dayEvents.map(e => {
                const info = staffInfo[e.owner] || { icon: '📍', color: '#666' };
                const isLeave = e.type.includes('ลา');
                const bgColor = isLeave ? '#ff475722' : `${info.color}22`;
                const textColor = isLeave ? '#ff4757' : info.color;
                return `<div class="event-tag" style="background:${bgColor}; color:${textColor}; border-left: 2px solid ${textColor}">
                    ${info.icon}${e.owner}: ${e.type.replace('อยู่เวร','เวร')}
                </div>`;
            }).join('');
            grid.innerHTML += `
                <div class="cal-cell ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''}" onclick="selectDate('${dateStr}')">
                    <span class="date-num" style="color:${holidayName ? 'var(--holiday)' : 'inherit'}">${d}</span>
                    <div class="holiday-label">${holidayName || ''}</div>
                    <div style="width:100%; overflow:hidden;">${eventHtml}</div>
                </div>`;
        }
        const list = document.getElementById('scheduleList');
        const filtered = db.filter(i => i.date === selectedDate);
        list.innerHTML = `<h4 style="margin:10px 0; color:#8b949e; border-bottom: 1px solid #333; padding-bottom:5px;">📅 รายการวันที่เลือก (${filtered.length})</h4>`;
        filtered.forEach(i => {
            const info = staffInfo[i.owner] || { icon: '❓', color: '#666' };
            list.innerHTML += `<div class="hist-item" style="border-left-color:${info.color}">
                <div><strong>${info.icon} ${i.owner}</strong><br><small style="color:var(--accent)">${i.type}</small></div>
                <div onclick="del('${i.id}')" class="del-btn">ลบ</div>
            </div>`;
        });
    }
    pullData();
    setInterval(pullData, 30000);
</script>
</body>
</html>
